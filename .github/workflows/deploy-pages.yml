name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]

# 關鍵定位：必須明確宣告權限，否則 Action 會因為 Permission Denied 噴紅叉
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 假設你是靜態網頁，直接上傳當前目錄。若是前端框架，路徑需改為打包後的資料夾（如 dist）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
