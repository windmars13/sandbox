name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest pytest-cov genbadge[tests] black

      - name: Run Black (code style check)
        run: python -m black --check .

      - name: Run tests and generate report
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest --cov=src --cov-report=xml -v

      # 修正點：移除 python -m，改為直接呼叫 genbadge
      - name: Generate coverage badge
        run: |
          genbadge coverage -i coverage.xml -o coverage.svg

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage.svg
