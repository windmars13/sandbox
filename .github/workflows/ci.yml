name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # 需要 package-lock.json 存在於 repo root 才會生效
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      # 前端測試框架尚未安裝（package.json 沒有 vitest/test script），先註解避免 CI 失敗
      # 之後 npm install -D vitest 並補上 "test": "vitest run" script 後再打開
      # - run: npm run test -- --passWithNoTests

      # 關鍵修正：requirements.txt 已刪除，統一用 pyproject.toml 管理依賴
      - run: pip install -e ".[dev]"
      - run: pytest || [ $? -eq 5 ] # exit code 5 = 沒有測試被收集到，視為通過
