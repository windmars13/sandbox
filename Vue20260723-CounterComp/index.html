<!DOCTYPE html>
<html lang="zh-tw">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>計數器 Vue 元件版</title>
	<link rel="stylesheet" href="../css/main.css">
</head>

<body>
	<h1>計數器 Vue 元件版</h1>

	<!-- id="app" 這個 div 就是「Vue 根元件」要接管的地方，
	     只有這個 div 裡面的內容，Vue 才看得到、才能用 {{ }} 語法 -->
	<div class="container" id="app">
		<div class="box" style="width: 400px;">
			<div class="row">
				<div class="context">統計資訊</div>
			</div>
			<div class="row">
				<!--
					v-for="counter in counters"：
					這是「迴圈渲染」，意思是 counters 陣列裡有幾筆資料，
					這個 div 就會被複製渲染幾次。
					每一次迴圈，counter 就代表陣列裡的「其中一筆物件」。
					下面被登出的 counter1/counter2/counter3 是「還沒用迴圈」之前的舊寫法，
					保留起來讓你比較「寫 4 行 vs 寫 1 行迴圈」的差異。
				-->
				<div class="context" v-for="counter in counters">{{counter.title}} 票價: {{counter.price}}, 人數: {{counter.cnt}}, 收入: {{counter.total}}</div>
				<!-- <div class="context">{{counter1.title}} 票價: {{counter1.price}}, 人數: {{counter1.cnt}}, 收入: {{counter1.total}}</div>
				<div class="context">{{counter2.title}} 票價: {{counter2.price}}, 人數: {{counter2.cnt}}, 收入: {{counter2.total}}</div>
				<div class="context">{{counter3.title}} 票價: {{counter3.price}}, 人數: {{counter3.cnt}}, 收入: {{counter3.total}}</div> -->

				<!-- cnt 和 total 是「computed 計算屬性」，會自動加總所有 counters 的人數/收入 -->
				<div class="context">總計人數: {{cnt}}, 總計收入: {{total}}</div>
			</div>
		</div>
		
		<!--
			<my-counter> 是「自訂元件」(在 main.js 裡用 app.component 定義)。
			這裡也是用 v-for 迴圈，把 counters 陣列裡每一筆資料，
			各自變成一個獨立的 <my-counter> 元件（等於是 4 台各自獨立的計數器）。

			:id / :title / :price 前面加冒號 :  =>  代表「動態綁定屬性 (props)」，
			意思是把 JS 變數的值傳「進去」子元件，而不是傳一個固定死的字串。
			(如果沒加冒號，例如 title="counter.title"，那就只是傳文字字串 "counter.title" 而已)

			@abc / @cntchg 前面加小老鼠 @ => 代表「監聽子元件發出的事件」，
			意思是子元件裡面用 this.$emit('abc', ...) 發射事件時，
			父層這裡要用哪個 method 來接收處理。

			<h2>大家好</h2> 這段內容，會被塞進子元件樣板裡的 <slot></slot> 位置（插槽）。
		-->
		<my-counter v-for="counter in counters" :id="counter.id" :title="counter.title" :price="counter.price" @abc="onAbc" @cntchg="onCntChg"><h2>大家好</h2></my-counter>
		<!-- <my-counter :id="counter1.id" :title="counter1.title" :price="counter1.price" @abc="onAbc" @cntchg="onCntChg1"><h2>大家好</h2></my-counter>
		<my-counter :id="counter2.id" :title="counter2.title" :price="counter2.price" @abc="onAbc" @cntchg="onCntChg2"><h2>我也好</h2></my-counter>
		<my-counter :id="counter3.id" :title="counter3.title" :price="counter3.price" @abc="onAbc" @cntchg="onCntChg3"><h2>我也好</h2></my-counter> -->
	</div>

	<!--
		type="text/x-template"：這不是真正的 <script>，瀏覽器不會執行它，
		它只是被 Vue 拿來當作「HTML 樣板字串」使用（id="my-counter" 供 main.js 引用）。
		這裡面的內容，就是每一個 <my-counter> 元件「長什麼樣子」。
	-->
	<script type="text/x-template" id="my-counter">
		<div class="box" style="width: 300px;">
			<div class="row">
				<!-- <slot></slot> 是「插槽」，父層在使用 <my-counter>...</my-counter> 標籤中間寫的內容，都會顯示在這個位置 -->
				<slot></slot>
			</div>
			<div class="row">
				<!-- title 是父層傳進來的 props，直接可以用 {{ }} 顯示 -->
				<div class="context">場地名稱: {{title}}</div>
			</div>
			<div class="row">
				<!-- @click="add" 意思是：這顆按鈕被點擊時，呼叫這個元件 methods 裡的 add() 函式 -->
				<button class="btn" @click="add">加一</button>
				<button class="btn" @click="sub">減一</button>
				<button class="btn" @click="clr">清除</button>
				<button class="btn" @click="goOut">傳出去</button>
			</div>
			<div class="row">
				<!-- :style="fcolor" 是把 computed 算出來的顏色字串，動態套用到 style 屬性上 -->
				<div class="context">目前人數: <span :style="fcolor">{{cnt}}</span></div>
				<div class="context">收入小計: <span :style="fcolor">{{total}}</span></div>
			</div>
		</div>
	</script>



	<div class="container">
		<div class="msg-box">
			<div class="row">
				<div class="context-msg">訊息框</div>
				<button type="button" class="btn btn-right" id="bClrMsg">清除</button>
			</div>
			<!-- 這個 <pre id="msg"> 不是 Vue 管的區域，是給 main.js 用原生 JS (getElementById) 操作的普通訊息輸出框 -->
			<pre class="msg" id="msg"></pre>
		</div>
	</div>

	<!-- type="module" 才能在 main.js 裡使用 import 語法（ES Module） -->
	<script type="module" src="main.js"></script>
</body>

</html>
